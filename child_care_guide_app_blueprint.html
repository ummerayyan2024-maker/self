  document.querySelectorAll('.age-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setSection(sec, btn) {
  currentSection = sec;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function toggleIllness(el) {
  const body = el.querySelector('.illness-body');
  body.classList.toggle('open');
}

function render() {
  const d = ageData[currentAge];
  const c = document.getElementById('content');

  if (currentSection === 'meds') {
    c.innerHTML = renderMeds();
    return;
  }

  if (currentSection === 'milestones') {
    let ms = d.milestones.map(m => `
      <div class="milestone-row">
        <div class="ms-icon" style="background:${m.bg}"><i class="ti ${m.icon}" style="font-size:15px;color:${m.color}" aria-hidden="true"></i></div>
        <div class="ms-body"><div class="ms-title">${m.title}</div><div class="ms-sub">${m.sub}</div></div>
      </div>`).join('');
    let tips = d.devTips.map(t => `<div style="font-size:12px;color:var(--color-text-primary);padding:5px 0 5px 14px;border-left:2px solid #1B7A5A;margin-bottom:6px;line-height:1.5">${t}</div>`).join('');
    c.innerHTML = `
      <div class="section-card">
        <div class="section-label"><i class="ti ti-chart-line" aria-hidden="true"></i> ${d.label} — ${d.sublabel}</div>
        ${ms}
      </div>
      <div class="section-card">
        <div class="section-label"><i class="ti ti-bulb" aria-hidden="true"></i> Development tips</div>
        ${tips}
      </div>`;
    return;
  }

  if (currentSection === 'nutrition') {
    const n = d.nutrition;
    let eat = n.eat.map(f => `<div class="food-item food-ok"><i class="ti ti-check" aria-hidden="true"></i>${f}</div>`).join('');
    let avoid = n.avoid.map(f => `<div class="food-item food-no"><i class="ti ti-x" aria-hidden="true"></i>${f}</div>`).join('');
    let drinks = n.drinks.map(dr => `<div class="drink-item"><i class="ti ti-droplet" aria-hidden="true"></i>${dr}</div>`).join('');
    c.innerHTML = `
      <div class="section-card">
        <div class="section-label"><i class="ti ti-apple" aria-hidden="true"></i> Daily requirements</div>
        <div class="stat-grid">
          <div class="stat-cell"><div class="stat-num">${n.cals.split(' ')[0]}</div><div class="stat-lbl">calories/day</div></div>
          <div class="stat-cell"><div class="stat-num">${n.protein.split('/')[0]}</div><div class="stat-lbl">protein/day</div></div>
        </div>
      </div>
      <div class="section-card">
        <div class="section-label"><i class="ti ti-check" aria-hidden="true"></i> Healthy foods to eat</div>
        <div class="food-grid">${eat}</div>
      </div>
      <div class="section-card">
        <div class="section-label"><i class="ti ti-x" aria-hidden="true"></i> Foods to avoid</div>
        <div class="food-grid">${avoid}</div>
      </div>
      <div class="section-card">
        <div class="section-label"><i class="ti ti-droplet" aria-hidden="true"></i> Recommended drinks</div>
        ${drinks}
      </div>`;
    return;
  }

  if (currentSection === 'sleep') {
    const s = d.sleep;
    const hrs = parseInt(s.hours);
    const pct = Math.round((hrs / 17) * 100);
    let tipList = s.tips.map(t => `<div style="font-size:12px;padding:5px 0;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;gap:8px;align-items:flex-start"><i class="ti ti-moon" style="font-size:14px;color:#1B7A5A;margin-top:1px" aria-hidden="true"></i><span>${t}</span></div>`).join('');
    c.innerHTML = `
      <div class="section-card">
        <div class="section-label"><i class="ti ti-moon" aria-hidden="true"></i> Sleep requirements</div>
        <div style="font-size:20px;font-weight:500;color:#1B7A5A;margin:4px 0 2px">${hrs}+ hrs</div>
        <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:6px">${s.hours}</div>
        <div class="sleep-bar"><div class="sleep-fill" style="width:${pct}%"></div></div>
        <div style="font-size:12px;color:var(--color-text-secondary)">${s.naps}</div>
      </div>
      <div class="section-card">
        <div class="section-label"><i class="ti ti-star" aria-hidden="true"></i> Sleep hygiene tips</div>
        ${tipList}
      </div>`;
    return;
  }

  if (currentSection === 'activity') {
    const a = d.activity;
    let items = a.items.map(i => `
      <div class="activity-item">
        <div class="act-icon"><i class="ti ${i.icon}" aria-hidden="true"></i></div>
        <div class="act-text">${i.text}</div>
      </div>`).join('');
    c.innerHTML = `
      <div class="section-card">
        <div class="section-label"><i class="ti ti-run" aria-hidden="true"></i> Physical activity</div>
        <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:10px;line-height:1.5">${a.note}</div>
        ${items}
      </div>`;
    return;
  }

  if (currentSection === 'health') {
    let cards = d.illnesses.map((ill,i) => `
      <div class="illness-card" onclick="this.querySelector('.illness-body').classList.toggle('open')">
        <div class="illness-head">
          <div class="illness-name">${ill.name}</div>
          <span class="illness-badge" style="background:${ill.badgeBg};color:${ill.badgeColor}">${ill.badge}</span>
        </div>
        <div class="illness-body">
          <div class="ill-row"><div class="ill-key">Symptoms</div><div class="ill-val">${ill.symptoms}</div></div>
          <div class="ill-row"><div class="ill-key">Prevention</div><div class="ill-val">${ill.prevention}</div></div>
          <div class="warn-box"><div class="warn-title"><i class="ti ti-stethoscope" aria-hidden="true"></i> See a doctor if</div><div class="warn-text">${ill.doctor}</div></div>
          <div class="danger-box"><div class="danger-title"><i class="ti ti-alert-triangle" aria-hidden="true"></i> Emergency signs</div><div class="danger-text">${ill.emergency}</div></div>
        </div>
      </div>`).join('');
    c.innerHTML = `
      <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:10px;line-height:1.5">Tap an illness to expand details, prevention, and warning signs.</div>
      ${cards}`;
    return;
  }
}

function renderMeds() {
  const cards = medications.map(m => `
    <div class="med-card">
      <div class="med-header">
        <div class="med-icon"><i class="ti ${m.icon}" aria-hidden="true"></i></div>
        <div><div class="med-name">${m.name}</div><div class="med-generic">${m.generic}</div></div>
      </div>
      <div class="med-row"><span class="med-key">Purpose</span><span class="med-val">${m.purpose}</span></div>
      <div class="med-row"><span class="med-key">Age suitability</span><span class="med-val">${m.age}</span></div>
      <div class="med-row"><span class="med-key">Side effects</span><span class="med-val">${m.side}</span></div>
      <div class="med-row"><span class="med-key">Precautions</span><span class="med-val">${m.precaution}</span></div>
      <div class="consult-box"><div class="consult-text"><i class="ti ti-stethoscope" aria-hidden="true"></i> Dosage: ${m.dosage} — Always confirm dosage with a doctor or pharmacist before giving any medication.</div></div>
    </div>`).join('');
  return `
    <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:10px;line-height:1.5">Medication details are for reference only. Always consult a doctor before administering any medicine to a child.</div>
    ${cards}`;
}

render();
</script>
